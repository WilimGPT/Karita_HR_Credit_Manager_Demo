<!--
  File: index.html
  Purpose: Karita HR Credit Manager — prototype UI for viewing and adjusting
           student credit allocations within a company's credit pool.
  Notes:   
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karita HR Credit Manager</title>
  <style>
    /* ==========================================================================
       1. DESIGN TOKENS
       ========================================================================== */

    :root {
      --color-text:     #222;
      --color-bg:       #fff;
      --color-border:   #aaa;
      --color-surface:  #f5f5f5;
      --color-accent:   #5b9bd5;
      --color-increase: #009900;
      --color-decrease: #cc0000;

      --font-size-base: 14px;
      --font-size-sm:   12px;
    }

    /* ==========================================================================
       2. RESET / BASE
       ========================================================================== */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: var(--font-size-base);
      color: var(--color-text);
      background: var(--color-bg);
      padding: 32px 40px;
    }

    /* ==========================================================================
       3. LAYOUT
       ========================================================================== */

    .container    { max-width: 720px; }
    .section      { margin-bottom: 22px; }
    .company-row  { display: flex; align-items: center; gap: 6px; }
    .confirm-row  { display: flex; justify-content: flex-end; align-items: center; margin-top: 14px; }
    .log-section  { margin-top: 36px; }

    /* ==========================================================================
       4. COMPONENTS
       ========================================================================== */

    /* --- Tooltip icon --- */

    .tooltip-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1.5px solid var(--color-accent);
      color: var(--color-accent);
      font-size: 10px;
      font-style: italic;
      font-family: Georgia, serif;
      cursor: default;
      position: relative;
      vertical-align: middle;
      margin-left: 3px;
      flex-shrink: 0;
    }
    .tooltip-icon::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: var(--color-bg);
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-style: normal;
      font-family: Arial, sans-serif;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .tooltip-icon:hover::after { opacity: 1; }

    /* --- Credit pool table --- */

    .pool-table { border-collapse: collapse; width: 100%; }
    .pool-table td {
      border: 1px solid var(--color-border);
      padding: 7px 14px;
    }
    .pool-label { font-weight: bold; white-space: nowrap; }
    .pool-value { text-align: center; width: 100%; font-size: var(--font-size-base); }
    .pool-cell  { display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* --- Students table --- */

    .students-table { border-collapse: collapse; width: 100%; }
    .students-table th,
    .students-table td {
      border: 1px solid var(--color-border);
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
    }
    .students-table th { font-weight: normal; background: var(--color-surface); }
    .students-table td.name-cell { text-align: left; }

    .col-minus { color: var(--color-decrease); font-size: var(--font-size-sm); }
    .col-plus  { color: var(--color-increase); font-size: var(--font-size-sm); }

    /* --- Adjust buttons (▼ / ▲) --- */

    .btn-adjust {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      font-size: var(--font-size-base);
      line-height: 1;
    }
    .btn-adjust.minus { color: var(--color-decrease); }
    .btn-adjust.plus  { color: var(--color-increase); }
    .btn-adjust:hover    { opacity: 0.65; }
    .btn-adjust:disabled { opacity: 0.25; cursor: default; }

    /* --- Change column value --- */

    .change-positive { color: var(--color-increase); }
    .change-negative { color: var(--color-decrease); }
    .change-zero     { color: var(--color-text); }

    /* --- Confirm button --- */

    .btn-confirm {
      border: 2px solid var(--color-text);
      background: var(--color-bg);
      padding: 8px 18px;
      font-size: var(--font-size-base);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-confirm:hover { background: var(--color-surface); }

    /* --- Log --- */

    .log-header {
      display: flex;
      align-items: center;
      border: 2px solid var(--color-text);
      border-bottom: none;
      padding: 5px 10px;
      background: var(--color-bg);
      gap: 6px;
    }
    .log-title { flex: 1; font-size: var(--font-size-base); }

    .btn-log {
      border: 1px solid #555;
      background: var(--color-bg);
      padding: 3px 10px;
      font-size: var(--font-size-sm);
      cursor: pointer;
    }
    .btn-log:hover { background: var(--color-surface); }

    #log-output {
      display: block;
      width: 100%;
      min-height: 220px;
      background: #000;
      color: var(--color-bg);
      font-family: monospace;
      font-size: 13px;
      padding: 12px 14px;
      border: 2px solid var(--color-text);
      resize: vertical;
      cursor: default;
      user-select: text;
      -webkit-user-select: text;
      outline: none;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ===== COMPANY SELECT ===== -->
  <div class="section company-row">
    <select id="company-select">
      <option value="">Select Company</option>
    </select>
    <span class="tooltip-icon" data-tip="Slugs pulled from Users API. Will need pagination. Could also consider a set list, with a refresh button to call users API and update - could take too long if done every time.">i</span>
  </div>

  <!-- ===== CREDIT POOL ===== -->
  <div class="section">
    <table class="pool-table">
      <tr>
        <td class="pool-label">Credit Pool</td>
        <td class="pool-value">
          <div class="pool-cell">
            <span id="credit-pool-value">—</span>
            <span class="tooltip-icon" data-tip="Currently pulled from student with username starting "placeholder_student", followed by company slug. This student is never used, so all credits are available to redistribute.>i</span>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- ===== STUDENTS TABLE ===== -->
  <div class="section">
    <table class="students-table">
      <thead>
        <tr>
          <th></th>
          <th>total <span class="tooltip-icon" data-tip="private_classes_allowed value. Read only value in our UI.">i</span></th>
          <th>used <span class="tooltip-icon" data-tip="private_classes_allowed - private_classes_remaining. Read only value in our UI.">i</span></th>
          <th>remaining <span class="tooltip-icon" data-tip="private_classes_remaining">i</span></th>
          <th class="col-minus">- <span class="tooltip-icon" data-tip="Remove one credit from the student, add one to the pool.">i</span></th>
          <th class="col-plus">+ <span class="tooltip-icon" data-tip="Add one credit to the student, remove one from the pool.">i</span></th>
          <th>change <span class="tooltip-icon" data-tip="Indicates the difference proposed (+/-) from the current remaining value.">i</span></th>
        </tr>
      </thead>
      <tbody id="students-tbody"></tbody>
    </table>
  </div>

  <!-- ===== CONFIRM CHANGES ===== -->
  <div class="confirm-row">
    <button class="btn-confirm" id="btn-confirm">
      confirm changes
      <span class="tooltip-icon" data-tip="Calls the users api again for affected users (including placeholder student). Confirms that proposed changes would not result in negative values, in case of credit count changes since the initial API call. In that case, flags and refreshes, keeping the proposed changes which were okay. Otherwise, executes.">i</span>
    </button>
  </div>

  <!-- ===== LOG ===== -->
  <div class="section log-section">
    <div class="log-header">
      <span class="log-title">log</span>
      <button class="btn-log" id="btn-clear-log">clear log</button>
      <button class="btn-log" id="btn-copy-log">copy log</button>
    </div>
    <textarea id="log-output" readonly spellcheck="false">...ready</textarea>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
